<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Masuk | SMPK System</title>
    <style>
        /* CSS DALAMAN - Konsisten dengan modul lain */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            line-height: 1.6;
            min-height: 100vh;
        }

        .navbar {
            background-color: #2c3e50;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-links {
            display: flex;
            list-style: none;
        }

        .nav-links li {
            margin-left: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .container {
            max-width: 1100px;
            margin: 3rem auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            max-width: 450px;
            margin: auto;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .btn {
            width: 100%;
            height: 48px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        #msg {
            margin-top: 15px;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo">SMPK System</div>
        <ul class="nav-links">
            <li><a href="index.html">Utama</a></li>
            <li><a href="daftar.html">Daftar</a></li>
            <li><a href="login.html">Log Masuk</a></li>
            <li><a href="carian.html">Carian</a></li>
        </ul>
    </nav>
    <main class="container">
        <div class="card">
            <h2>Log Masuk</h2>
            <p style="font-size: 0.8rem; color: #666; margin-bottom: 20px;">Masukkan Nama dan E-mel berdaftar anda.</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginName">Nama Pelajar</label>
                    <input type="text" id="loginName" placeholder="Nama anda" required>
                </div>
                <div class="form-group">
                    <label for="loginEmail">Alamat E-mel</label>
                    <input type="email" id="loginEmail" placeholder="ali@example.com" required>
                </div>
                <button type="submit" class="btn">Masuk Sekarang</button>
            </form>
            <div id="msg"></div>
        </div>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const nameInput = document.getElementById('loginName').value.trim();
            const emailInput = document.getElementById('loginEmail').value.trim();
            const msgDiv = document.getElementById('msg');
            
            msgDiv.innerText = "⌛ Meneliti pangkalan data...";
            msgDiv.style.color = "#333";

            try {
                // 1. SEMAK REKOD TEMPATAN (Dari daftar.html)
                // Kita ambil array 'pelajarTempatan'
                const localUsers = JSON.parse(localStorage.getItem('pelajarTempatan')) || [];
                
                // Cari pengguna dalam array yang sepadan dengan nama DAN email
                const foundLocal = localUsers.find(u => 
                    u.name.toLowerCase() === nameInput.toLowerCase() && 
                    u.email.toLowerCase() === emailInput.toLowerCase()
                );

                if (foundLocal) {
                    msgDiv.innerHTML = `<span style="color:green">Berjaya! Selamat datang, ${foundLocal.name}. (Rekod Tempatan)</span>`;
                    // Opsyenal: Redirect selepas 1.5 saat
                    // setTimeout(() => window.location.href = "index.html", 1500);
                    return;
                }

                // 2. SEMAK REKOD DARI API (Jika tidak jumpa di lokal)
                const res = await fetch('https://jsonplaceholder.typicode.com/users');
                const apiUsers = await res.json();
                
                const foundApi = apiUsers.find(u => 
                    u.name.toLowerCase() === nameInput.toLowerCase() && 
                    u.email.toLowerCase() === emailInput.toLowerCase()
                );

                if (foundApi) {
                    msgDiv.innerHTML = `<span style="color:green">Berjaya Log Masuk! (Rekod API: ${foundApi.company.name})</span>`;
                } else {
                    msgDiv.innerHTML = `<span style="color:red">Ralat: Maklumat tidak ditemui. Sila pastikan e-mel dan nama adalah betul atau daftar dahulu.</span>`;
                }

            } catch (err) {
                msgDiv.innerHTML = `<span style="color:red">Kegagalan sistem untuk menyemak data API.</span>`;
                console.error(err);
            }
        });
    </script>
</body>

</html>
