<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran | SMPK System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            line-height: 1.6;
            min-height: 100vh;
        }

        .navbar {
            background-color: #2c3e50;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-links {
            display: flex;
            list-style: none;
        }

        .nav-links li {
            margin-left: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .container {
            max-width: 1100px;
            margin: 3rem auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            margin: auto;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        .btn-success {
            background-color: #27ae60;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo">SMPK System</div>
        <ul class="nav-links">
            <li><a href="index.html">Utama</a></li>
            <li><a href="daftar.html">Daftar</a></li>
            <li><a href="login.html">Log Masuk</a></li>
            <li><a href="carian.html">Carian</a></li>
        </ul>
    </nav>
    <main class="container">
        <div class="card">
            <h2>Pendaftaran Pelajar</h2>
            <form id="regForm">
                <div class="form-group">
                    <label for="regName">Nama Penuh</label>
                    <input type="text" id="regName" placeholder="Contoh: Ali bin Abu" required>
                </div>
                <div class="form-group">
                    <label for="regEmail">E-mel</label>
                    <input type="email" id="regEmail" placeholder="ali@example.com" required>
                </div>
                <button type="submit" class="btn" id="btnSubmit">Daftar Sekarang</button>
            </form>
            <div id="regFeedback" style="display:none; margin-top: 20px;">
                <p style="color: #27ae60; font-weight: bold; margin-bottom: 10px;">Pendaftaran Berjaya!</p>
                <a href="carian.html" class="btn btn-success">Pergi ke Modul Carian</a>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('regForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;

            // Ambil data sedia ada atau buat array kosong
            let senaraiPelajar = JSON.parse(localStorage.getItem('pelajarTempatan')) || [];

            // Simpan data dalam format yang sama dengan API
            const pelajarBaru = {
                id: Date.now(),
                name: name,
                email: email,
                company: { name: "Pelajar Berdaftar (Manual)" }
            };

            senaraiPelajar.push(pelajarBaru);
            localStorage.setItem('pelajarTempatan', JSON.stringify(senaraiPelajar));

            document.getElementById('regForm').style.display = 'none';
            document.getElementById('regFeedback').style.display = 'block';
        });
    </script>
</body>

</html>
